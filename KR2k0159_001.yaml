body:
  text: 大魏諸州記潞縣城西三十里有潞河源出北山南流一名鮑邱水寰宇記益州汶山郡平康縣界東北接牂牁有都安縣有交讓樹兩兩相對歲更牙枯牙生不俱盛御覽巨鹿廣阿澤多葦出細席多雲母小平津有洞穴鯉魚從穴中出入大者重千斤每至三月中有鱣魚從穴出入河重千斤色青皮如鮫魚皮有珠文口在頜下並初學記隴西郡隴山其上懸溜於中嶺泉亭因名萬石泉泉溢漫散而下溝澮皆注有人升此而歌御覽自此下皆魏土地記朔方縣有大鹽池其鹽大而青名曰青鹽又名戎鹽入藥分漢置典官鹽池去平地宮千二百里在新秦之中雲中城東八十里有成樂城今雲中郡治一名盧石城也雲中宮在雲中故城東四十里梁山北有龍門山大禹所鑿通孟津河口廣八十步巖際鐫跡遺功尚在河東郡北八十里有汾陰城北去汾水三里城西北隅曰睢邱上有后土祠農胡縣有軒轅黃帝登仙處治阪城舊名漢祖渡倉亭津在武陽縣東北七十里汾陽秀容胡人徙居之立秀容蔎軍治晉陽城東有汾水南流平陽郡治楊縣郡西有汾水南流者是也平陽城東十里汾水東原上有小臺臺上有堯神屋石碑晉陽城東南一百一十里至大嵰山有蔣谷大道度軒車嶺通於武鄉穀城縣有穀城山山出文石盟津河別流十里與清水合亂流而東徑洛當城北修武城西北二十有吳澤水建興郡治陽河縣郡西四十里有沁水南流河內郡野王縣西七十里有沁水左徑沁水城高城東北五十里有篋山長七里章武縣東一百里有武帝臺南北有二臺相去六十里高六十丈俗云漢武帝東巡海上所築高城縣東北一百里北盡漂榆南臨巨海民咸煮海水藉鹽為業即此城也鄴城南四十里有安陽城城北有洹水東流者也東平舒縣章武郡治故世以為章武故城非也平城宮西三十里口周塞口者也代城北九十里有桑乾城代城西九十里有平舒城代城西南三十里有代王魚池池西北有代王臺代城南四十里有飛狐門代城內有二泉一源流出城西一源流出城北門二源皆北注代水代南二百里有廣昌城南通大嶺即此代城東五十里有到刺山山上有佳大黃代城東北九十里有空頭城下洛城西南九十里有協陽關關道西通代郡下洛城西南四十里有潘城城西北三里有歷山山上有虞舜廟下洛城西南二十里有雍洛城桑乾水在城南東流者也下洛去平城五十里城南二百步有堯廟下洛城東南四十里有橋山下有溫泉下洛西北百三十里有大寧城大寧城西二十里有延河東流北有鳴雞山如口城在鳴雞山西十里南通大道西達寧川下洛城東南六十里有涿鹿城城東一里有陂泉泉上有黃帝祠涿鹿城東南六里有蚩尤城泉水滿而不流霖雨併則流注陂泉亂流代城東二十二里有馬頭山其側有鍾乳穴沮陽城東八十里有牧羊山下有九十里泉即滄河之上源也沮陽城東北六十里有大翮小翮山山上神名大翮神牧牛泉西流與清夷水合者也上谷城北有清夷水西流也薊城南七里有清泉河清泉河上承桑乾河東流與潞河合薊東一十里有高梁之水者其水又東南入濕水也薊城東北一百四十里有昌平城城西有昌平河薊城東北三百里有右比平城石比平城西北百三十里有無終城其水又南入灅水右比平城東北一百一十里有徐無城徐無城東有溫湯漁陽城南五里有嬴山其水西南入沽水狐奴城西三十里有潞河也肥如城西十里有濡水南流注徑孤竹城西右合兀水也海陽城西南有陽樂城其水又西南入於沮水令支城南六十里有海陽城黃龍城西南有白狼河東北流附城東北下自狼水下入遼也藍田縣南有嶢關地名嶢柳道通荊州並水經注代郡東南二十五里有馬頭山趙襄子既殺代王使人迎其婦代王夫人曰以弟慢夫非仁也以夫怨弟非義也糜笄自殺而死使者遂亦自殺史記正義鹵地東州四十八里有梅嶺初學記頌陽縣東八十里有駮牛山山下有泉泉競發有一神牛駮身自山而下飲泉竭故山得名御覽鹵城東三十八里有枝回嶺北與高是山連麓接勢通為高是山寰宇記黃山在壼關縣東司馬山在晉城縣北晉代祠山因以為名太原郡山有石室方丈四壁文字篆書人不能識並初學記引輿圖風土記齊分營州之域置西營邱郡於其城內盧龍西四十九里有藍山其色藍翠重疊故名之彭盧水至徒河入海與地平故曰平盧今語訛為彭盧並寰宇記引輿圖風土記藍田山巔方一里仙聖遊集之所劉雄鳴學道於山下有祠甚嚴霸水之源出此又西有尊盧氏陵次北有女媧氏谷則知此地是三皇舊居於此南易水本名漳水源出三門山按趙地記云六國時此水名易水埤蒼及水經云洺水其目不知誰改俗謂山之下地名洺水因經之故曰洺水燕趙記云其分有三易漳為南易是也並御覽引後魏風土記太原郡箕山有許由冢武訖嶺在長子縣南趙軍戰於長平趙軍敗退秦白起逐至此名曰武訖嶺晉末山戎內侵徙壽陽之民於太寧城南置壽陽縣神農城在羊頭山上山下有神農泉即神農得嘉穀之所靈山因趙武靈王葬其上故曰靈山並寰宇記引後魏風土記陽周有黃帝陵在子午谷山上今冢存路史引風土記朔方故城太和十年改為沃野鎮至後周又置普樂郡隋開皇初郡廢又置靈武郡正始三年尚書原思禮侍郎韓貞撫巡蕃塞以沃野鎮居南其蘭山口六鎮不齊別置三戍並寰宇記引陸恭之風土記
